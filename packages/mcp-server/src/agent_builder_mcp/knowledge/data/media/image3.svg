<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .ink   { fill: #16191f; }
    .muted { fill: #5f6b7a; }
    .link  { fill: #0972d3; }
    .title { font-weight: 700; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#5f6b7a"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="1179" height="699" fill="#ffffff" stroke="#e9ebed"/>

  <!-- ================= TITLE ================= -->
  <text x="40" y="48" class="ink" font-size="22" font-weight="700">Partner Agent Onboarding Architecture</text>

  <!-- ================= STICK FIGURES ================= -->
  <!-- ATX users -->
  <g stroke="#16191f" stroke-width="1.6" stroke-linecap="round" fill="none">
    <circle cx="60" cy="118" r="11" fill="#ffffff"/>
    <line x1="60" y1="129" x2="60" y2="160"/>
    <line x1="42" y1="142" x2="78" y2="142"/>
    <line x1="60" y1="160" x2="44" y2="184"/>
    <line x1="60" y1="160" x2="76" y2="184"/>
  </g>
  <text x="60" y="206" class="ink" font-size="15" font-weight="600" text-anchor="middle">ATX users</text>

  <!-- Partners -->
  <g stroke="#16191f" stroke-width="1.6" stroke-linecap="round" fill="none">
    <circle cx="60" cy="500" r="11" fill="#ffffff"/>
    <line x1="60" y1="511" x2="60" y2="542"/>
    <line x1="42" y1="524" x2="78" y2="524"/>
    <line x1="60" y1="542" x2="44" y2="566"/>
    <line x1="60" y1="542" x2="76" y2="566"/>
  </g>
  <text x="60" y="588" class="ink" font-size="15" font-weight="600" text-anchor="middle">Partners</text>

  <!-- ================= ATX ACCOUNT (top container) ================= -->
  <rect x="200" y="70" width="430" height="370" rx="8" fill="#ffffff" stroke="#16191f" stroke-width="1.5"/>
  <text x="415" y="98" class="ink" font-size="16" font-weight="700" text-anchor="middle">ATX account</text>

  <!-- Chat agent -->
  <rect x="270" y="120" width="290" height="58" rx="6" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.4"/>
  <text x="415" y="155" class="ink" font-size="15" font-weight="600" text-anchor="middle">Chat agent</text>

  <!-- Job manager / Invocation -->
  <rect x="270" y="228" width="290" height="58" rx="6" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.4"/>
  <text x="415" y="263" class="ink" font-size="15" font-weight="600" text-anchor="middle">Job manager/Invocation</text>

  <!-- Agent registry -->
  <rect x="270" y="336" width="290" height="58" rx="6" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.4"/>
  <text x="415" y="371" class="ink" font-size="15" font-weight="600" text-anchor="middle">Agent registry</text>

  <!-- internal arrows: Chat -> Job manager -->
  <line x1="415" y1="178" x2="415" y2="222" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Job manager -> Agent registry (Search) -->
  <line x1="415" y1="286" x2="415" y2="330" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="428" y="313" class="muted" font-size="13">Search</text>

  <!-- ================= PARTNER ACCOUNT (top-right container) ================= -->
  <rect x="760" y="70" width="380" height="370" rx="8" fill="#ffffff" stroke="#16191f" stroke-width="1.5"/>
  <text x="950" y="98" class="ink" font-size="16" font-weight="700" text-anchor="middle">Partner account</text>

  <!-- VPC sub-box -->
  <rect x="800" y="118" width="300" height="180" rx="6" fill="#ffffff" stroke="#aab7b8" stroke-width="1.4"/>
  <!-- VPC icon -->
  <g transform="translate(816,132)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#16191f"/>
    <path d="M11 5 a6 6 0 1 0 0.1 0 z" fill="none" stroke="#ffffff" stroke-width="1.3"/>
    <circle cx="11" cy="11" r="2.4" fill="#ffffff"/>
  </g>
  <text x="846" y="148" class="ink" font-size="14" font-weight="600">VPC</text>

  <!-- Agent instance stacked cards (orange) -->
  <g>
    <rect x="930" y="178" width="120" height="78" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.4"/>
    <rect x="918" y="190" width="120" height="78" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.4"/>
    <rect x="906" y="202" width="120" height="78" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.4"/>
    <text x="966" y="236" font-size="14" font-weight="700" fill="#e07b00" text-anchor="middle">Agent</text>
    <text x="966" y="254" font-size="14" font-weight="700" fill="#e07b00" text-anchor="middle">instance</text>
  </g>

  <!-- Agent core runtime -->
  <rect x="800" y="320" width="300" height="92" rx="6" fill="#ffffff" stroke="#16191f" stroke-width="1.5"/>
  <text x="950" y="372" class="ink" font-size="17" font-weight="700" text-anchor="middle">Agent core runtime</text>

  <!-- ================= PARTNER LOCAL DEV ENVIRONMENT (bottom container) ================= -->
  <rect x="200" y="470" width="430" height="180" rx="8" fill="#ffffff" stroke="#16191f" stroke-width="1.5"/>
  <text x="415" y="498" class="ink" font-size="16" font-weight="700" text-anchor="middle">Partner local dev environment</text>

  <!-- Agent container -->
  <rect x="270" y="514" width="290" height="98" rx="6" fill="#d4edda" stroke="#b7e0c0" stroke-width="1.4"/>
  <g font-size="14" class="ink">
    <text x="290" y="538">1. Strands agent</text>
    <text x="290" y="560">2. agent core sdk</text>
    <text x="290" y="582">3. ATX primitives</text>
    <text x="290" y="604">4. ATX base agent</text>
  </g>
  <text x="415" y="636" class="ink" font-size="14" font-weight="600" text-anchor="middle">Agent container</text>

  <!-- ================= AMAZON ECR (bottom-right icon) ================= -->
  <rect x="888" y="510" width="124" height="100" rx="8" fill="#1b2530" stroke="#16191f" stroke-width="1.4"/>
  <g transform="translate(923,528)" stroke="#ff7300" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M27 8 L52 21 V47 L27 60 L2 47 V21 Z"/>
    <path d="M27 8 V32 M27 60 V32 M2 21 L27 32 L52 21"/>
  </g>
  <text x="950" y="600" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Amazon ECR</text>

  <!-- ================= NUMBERED FLOW ARROWS ================= -->

  <!-- 5. SendMessage : ATX users -> Chat agent -->
  <line x1="84" y1="149" x2="264" y2="149" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="174" y="140" class="ink" font-size="14" font-weight="600" text-anchor="middle">5. SendMessage</text>

  <!-- 6. InvokeAgent : Job manager -> Agent instance (VPC) -->
  <line x1="560" y1="257" x2="900" y2="232" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="232" class="ink" font-size="14" font-weight="600" text-anchor="middle">6. InvokeAgent</text>

  <!-- 4. Register : Agent core runtime -> Agent registry -->
  <line x1="800" y1="366" x2="564" y2="366" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="682" y="357" class="ink" font-size="14" font-weight="600" text-anchor="middle">4. Register</text>

  <!-- 1. Edit/Build : Partners -> Agent container -->
  <line x1="84" y1="563" x2="264" y2="563" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="174" y="554" class="ink" font-size="14" font-weight="600" text-anchor="middle">1. Edit/Build</text>

  <!-- 2. Upload : Agent container -> Amazon ECR -->
  <line x1="560" y1="563" x2="884" y2="563" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="722" y="554" class="ink" font-size="14" font-weight="600" text-anchor="middle">2. Upload</text>

  <!-- 3. Deploy : Amazon ECR -> Agent core runtime -->
  <line x1="950" y1="510" x2="950" y2="416" stroke="#5f6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1012" y="466" class="ink" font-size="14" font-weight="600" text-anchor="middle">3. Deploy</text>
</svg>