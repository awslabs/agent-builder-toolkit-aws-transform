<svg xmlns="http://www.w3.org/2000/svg" width="980" height="400" viewBox="0 0 980 400" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .ink   { fill: #16191f; }
    .muted { fill: #5f6b7a; }
    .title { font-size: 18px; font-weight: 700; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#16191f"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="979" height="399" fill="#ffffff" stroke="#e9ebed"/>

  <!-- AWS swimlane -->
  <rect x="120" y="30" width="320" height="350" rx="8" fill="#ffffff" stroke="#d5dbdb" stroke-width="1.5"/>
  <path d="M120 54 a8 8 0 0 1 8 -8 h304 a8 8 0 0 1 8 8 v18 h-320 z" fill="#e6dcf0" stroke="#cbb9e0" stroke-width="1.4"/>
  <line x1="120" y1="72" x2="440" y2="72" stroke="#cbb9e0" stroke-width="1.4"/>
  <text x="280" y="65" class="ink title" text-anchor="middle">AWS</text>

  <!-- Partner swimlane -->
  <rect x="560" y="30" width="380" height="350" rx="8" fill="#ffffff" stroke="#d5dbdb" stroke-width="1.5"/>
  <path d="M560 54 a8 8 0 0 1 8 -8 h364 a8 8 0 0 1 8 8 v18 h-380 z" fill="#dff0d8" stroke="#b7e0c0" stroke-width="1.4"/>
  <line x1="560" y1="72" x2="940" y2="72" stroke="#b7e0c0" stroke-width="1.4"/>
  <text x="750" y="65" class="ink title" text-anchor="middle">Partner</text>

  <!-- Customer stick figure -->
  <g stroke="#16191f" stroke-width="1.8" stroke-linecap="round" fill="none">
    <circle cx="48" cy="118" r="12"/>
    <line x1="48" y1="130" x2="48" y2="162"/>
    <line x1="26" y1="142" x2="70" y2="142"/>
    <line x1="48" y1="162" x2="32" y2="186"/>
    <line x1="48" y1="162" x2="64" y2="186"/>
  </g>
  <text x="48" y="208" class="ink" font-size="14" font-weight="700" text-anchor="middle">Customer</text>

  <!-- Customer -> ATX Chat -->
  <line x1="74" y1="142" x2="148" y2="142" stroke="#16191f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ATX Chat + ATX boxes -->
  <rect x="150" y="100" width="68" height="92" rx="8" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.5"/>
  <text x="184" y="139" class="ink" font-size="14" font-weight="700" text-anchor="middle">ATX</text>
  <text x="184" y="157" class="ink" font-size="14" font-weight="700" text-anchor="middle">Chat</text>

  <rect x="214" y="92" width="118" height="108" rx="8" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.5"/>
  <text x="273" y="151" class="ink" font-size="16" font-weight="700" text-anchor="middle">ATX</text>

  <!-- ATX vended TaskAgent box (AWS lane) -->
  <rect x="200" y="290" width="160" height="74" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="280" y="314" class="ink" font-size="14" text-anchor="middle">An ATX vended</text>
  <text x="280" y="334" class="ink" font-size="14" font-weight="700" text-anchor="middle">TaskAgent</text>
  <text x="280" y="352" class="ink" font-size="14" font-weight="700" text-anchor="middle">(SubAgent)</text>

  <!-- Partner: Bedrock AgentCore (Orchestrator) -->
  <text x="592" y="98" class="ink" font-size="14">Bedrock AgentCore</text>
  <rect x="592" y="106" width="316" height="92" rx="8" fill="none" stroke="#d6b656" stroke-width="1.6" stroke-dasharray="5 4"/>
  <rect x="650" y="124" width="200" height="58" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="750" y="149" class="ink" font-size="14" text-anchor="middle">A Partner created</text>
  <text x="750" y="169" class="ink" font-size="14" font-weight="700" text-anchor="middle">Orchestrator Agent</text>

  <!-- Partner: Bedrock AgentCore (Task Agent) -->
  <text x="592" y="252" class="ink" font-size="14">Bedrock AgentCore</text>
  <rect x="592" y="260" width="316" height="100" rx="8" fill="none" stroke="#d6b656" stroke-width="1.6" stroke-dasharray="5 4"/>
  <rect x="650" y="278" width="200" height="68" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="750" y="300" class="ink" font-size="14" text-anchor="middle">A Partner created</text>
  <text x="750" y="318" class="ink" font-size="14" font-weight="700" text-anchor="middle">Task Agent</text>
  <text x="750" y="336" class="ink" font-size="14" font-weight="700" text-anchor="middle">(SubAgent)</text>

  <!-- Arrows: all A2A requests -->

  <!-- Orchestrator Agent -> ATX (right to left, horizontal into ATX box) -->
  <line x1="650" y1="148" x2="334" y2="135" stroke="#16191f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="478" y="137" class="ink" font-size="14" text-anchor="middle">A2A requests</text>

  <!-- ATX -> vended TaskAgent (down) -->
  <line x1="262" y1="200" x2="262" y2="286" stroke="#16191f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="262" y="240" class="ink" font-size="14" text-anchor="middle">A2A requests</text>

  <!-- ATX -> Partner Task Agent (down then right, elbow) -->
  <path d="M300 200 V258 H646" fill="none" stroke="#16191f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="510" y="248" class="ink" font-size="14" text-anchor="middle">A2A requests</text>

</svg>