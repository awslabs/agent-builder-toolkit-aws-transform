<svg xmlns="http://www.w3.org/2000/svg" width="540" height="220" viewBox="0 0 540 220" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .ink { fill: #16191f; }
  </style>

  <!-- legend card with dark navy border -->
  <rect x="20.5" y="20.5" width="499" height="179" rx="6" fill="#ffffff" stroke="#16263f" stroke-width="1.6"/>

  <!-- title -->
