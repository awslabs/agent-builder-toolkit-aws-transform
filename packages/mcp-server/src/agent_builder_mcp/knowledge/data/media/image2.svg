  <!-- row 1: ATX Service (light green) -->
  <rect x="48" y="92" width="150" height="36" rx="2" fill="#d4edda" stroke="#b7e0c0" stroke-width="1.4"/>
  <text x="258" y="116" class="ink" font-size="20" font-weight="700">ATX Service</text>

  <!-- row 2: Partner Account (light blue) -->
  <rect x="48" y="148" width="150" height="36" rx="2" fill="#cfe2f3" stroke="#9fc5e8" stroke-width="1.4"/>
