<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Builder Evolution Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.running {
            background: #06A77D;
        }

        .status-indicator.waiting {
            background: #F77F00;
        }

        .status-indicator.complete {
            background: #2E86AB;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
        }

        .metric-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }

        .metric-subtext {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
        }

        .metric-card.good .metric-value {
            color: #06A77D;
        }

        .metric-card.warning .metric-value {
            color: #F77F00;
        }

        .metric-card.danger .metric-value {
            color: #D62828;
        }

        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .table-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        th:first-child, td:first-child {
            text-align: left;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .best-row {
            background: #d4edda !important;
            font-weight: bold;
        }

        .current-row {
            background: #fff3cd !important;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.best {
            background: #06A77D;
            color: white;
        }

        .badge.current {
            background: #F77F00;
            color: white;
        }

        .gap-good {
            color: #06A77D;
            font-weight: bold;
        }

        .gap-warning {
            color: #F77F00;
            font-weight: bold;
        }

        .gap-danger {
            color: #D62828;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #666;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
        }

        .auto-refresh {
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Agent Builder Evolution Dashboard</h1>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusMessage">Loading...</span>
                </div>
                <div class="status-item">
                    <span class="auto-refresh">Auto-refresh: <strong id="refreshTime">5s</strong></span>
                </div>
            </div>
        </div>

        <div id="metricsContainer">
            <div class="loading">⏳ Waiting for data...</div>
        </div>

        <div class="footer">
            <p>Last updated: <span id="lastUpdate">Never</span></p>
        </div>
    </div>

    <script>
        let refreshInterval = 5000; // 5 seconds
        let lastData = null;

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                lastData = data;
                updateDashboard(data);
                updateLastUpdateTime();
            } catch (error) {
                console.error('Error fetching metrics:', error);
                if (!lastData) {
                    document.getElementById('metricsContainer').innerHTML = `
                        <div class="error">
                            <strong>⚠️ Unable to load data</strong><br>
                            ${error.message}<br>
                            Make sure the evolution is running.
                        </div>
                    `;
                }
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                updateStatus(status);
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        function updateStatus(status) {
            const indicator = document.getElementById('statusIndicator');
            const message = document.getElementById('statusMessage');

            indicator.className = 'status-indicator ' + status.status;

            if (status.status === 'running') {
                message.textContent = `${status.message} (Step ${status.step}, ${status.stage})`;
            } else if (status.status === 'complete') {
                message.textContent = '✅ ' + status.message;
            } else {
                message.textContent = status.message || 'Waiting...';
            }
        }

        function updateDashboard(data) {
            const metrics = data.metrics;
            const plots = data.plots;

            let html = '';

            // Summary metrics
            html += '<div class="metrics-grid">';

            // Current step
            const currentStep = metrics.current_step >= 0 ? metrics.current_step : 'N/A';
            html += `
                <div class="metric-card">
                    <div class="metric-label">Current Step</div>
                    <div class="metric-value">${currentStep}</div>
                </div>
            `;

            // Best validation
            if (metrics.best_val_step !== null) {
                html += `
                    <div class="metric-card good">
                        <div class="metric-label">Best Validation</div>
                        <div class="metric-value">Step ${metrics.best_val_step}</div>
                        <div class="metric-subtext">${metrics.best_val_rate.toFixed(1)}% pass rate</div>
                    </div>
                `;
            }

            // Latest gap
            const gapClass = metrics.latest_gap < 5 ? 'good' : metrics.latest_gap < 10 ? 'warning' : 'danger';
            html += `
                <div class="metric-card ${gapClass}">
                    <div class="metric-label">Latest Gap</div>
                    <div class="metric-value">${metrics.latest_gap !== null ? metrics.latest_gap.toFixed(1) + '%' : 'N/A'}</div>
                    <div class="metric-subtext">Train - Validation</div>
                </div>
            `;

            // Test results
            if (metrics.test_before) {
                const testChange = metrics.test_after
                    ? (metrics.test_after.pass_rate - metrics.test_before.pass_rate).toFixed(1)
                    : 'N/A';
                const testClass = metrics.test_after && testChange < 0 ? 'danger' : 'good';

                html += `
                    <div class="metric-card ${testClass}">
                        <div class="metric-label">Test Performance</div>
                        <div class="metric-value">${metrics.test_after ? metrics.test_after.pass_rate.toFixed(1) + '%' : 'Running...'}</div>
                        <div class="metric-subtext">Change: ${testChange !== 'N/A' ? (testChange > 0 ? '+' : '') + testChange + '%' : 'Pending'}</div>
                    </div>
                `;
            }

            html += '</div>';

            // Plots
            html += `
                <div class="chart-container">
                    <div id="plot1"></div>
                </div>
                <div class="chart-container">
                    <div id="plot2"></div>
                </div>
                <div class="chart-container">
                    <div id="plot3"></div>
                </div>
            `;

            // Data table
            html += `
                <div class="table-container">
                    <h3>Step-by-Step Results</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Step</th>
                                <th>Train Assertions</th>
                                <th>Train Pass Rate</th>
                                <th>Train Tests</th>
                                <th>Val Assertions</th>
                                <th>Val Pass Rate</th>
                                <th>Val Tests</th>
                                <th>Gap</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            for (let i = 0; i < metrics.steps.length; i++) {
                const step = metrics.steps[i];
                const isBest = step === metrics.best_val_step;
                const isCurrent = step === metrics.current_step;
                const rowClass = isBest ? 'best-row' : isCurrent ? 'current-row' : '';

                const gap = metrics.gaps[i];
                const gapClass = gap < 5 ? 'gap-good' : gap < 10 ? 'gap-warning' : 'gap-danger';

                html += `
                    <tr class="${rowClass}">
                        <td>
                            Step ${step}
                            ${isBest ? '<span class="badge best">Best</span>' : ''}
                            ${isCurrent ? '<span class="badge current">Current</span>' : ''}
                        </td>
                        <td>${metrics.train_assertions[i]}</td>
                        <td>${metrics.train_pass_rates[i].toFixed(1)}%</td>
                        <td>${metrics.train_test_rates[i].toFixed(1)}%</td>
                        <td>${metrics.val_assertions[i]}</td>
                        <td>${metrics.val_pass_rates[i] !== null ? metrics.val_pass_rates[i].toFixed(1) + '%' : 'N/A'}</td>
                        <td>${metrics.val_test_rates[i] !== null ? metrics.val_test_rates[i].toFixed(1) + '%' : 'N/A'}</td>
                        <td class="${gapClass}">${gap !== null ? '+' + gap.toFixed(1) + '%' : 'N/A'}</td>
                        <td>${metrics.timestamps[i]}</td>
                    </tr>
                `;
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('metricsContainer').innerHTML = html;

            // Render plots
            if (plots.assertion_rates) {
                Plotly.newPlot('plot1', JSON.parse(plots.assertion_rates).data,
                              JSON.parse(plots.assertion_rates).layout);
            }
            if (plots.test_rates) {
                Plotly.newPlot('plot2', JSON.parse(plots.test_rates).data,
                              JSON.parse(plots.test_rates).layout);
            }
            if (plots.gaps) {
                Plotly.newPlot('plot3', JSON.parse(plots.gaps).data,
                              JSON.parse(plots.gaps).layout);
            }
        }

        function updateLastUpdateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
        }

        // Initial fetch
        fetchMetrics();
        fetchStatus();

        // Auto-refresh
        setInterval(() => {
            fetchMetrics();
            fetchStatus();
        }, refreshInterval);
    </script>
</body>
</html>
